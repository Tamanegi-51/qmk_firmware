name: Build Vial QMK Firmware
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  KEYBOARD_NAME: "stroem" # キーボードの名前
  USER_REPO_PATH: "Tamanegi-51/qmk_firmware/keyboards/stroem" # 自身のキーボードのリポジトリ名/qmk_firmware/keyboards/キーボードの名前
  FIRMWARE_VARIANT: "vial" # バリアント名

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout QMK Firmware (Official)
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          path: qmk_firmware
          submodules: recursive

      - name: Checkout User Config
        uses: actions/checkout@v4
        with:
          repository: Tamanegi-51/qmk_firmware
          path: user_repo

      - name: Inject Keyboard and Setup
        run: |
          cp -r user_repo/keyboards/${{ env.KEYBOARD_NAME }} qmk_firmware/keyboards/
          cd qmk_firmware
          python3 -m pip install qmk
          qmk setup -y

      - name: Build Firmware for RP2040
        run: |
          cd qmk_firmware
          qmk compile -kb ${{ env.KEYBOARD_NAME }} -km ${{ env.FIRMWARE_VARIANT }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KEYBOARD_NAME }}_${{ env.FIRMWARE_VARIANT }}_firmware
          path: |
            qmk_firmware/*.uf2
            qmk_firmware/*.hex
            qmk_firmware/*.bin
            qmk_firmware/.build/*
