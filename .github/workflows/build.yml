
name: Build Vial QMK Firmware
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  KEYBOARD_NAME: "stroem" # キーボードの名前
  USER_REPO_PATH: "Tamanegi-51/qmk_firmware" # 自身のキーボードのリポジトリ名/qmk_firmware/keyboards/キーボードの名前
  FIRMWARE_VARIANT: "vial" # バリアント名

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout qmk_firmware
        uses: actions/checkout@v4
        with:
          repository: ${{ env.USER_REPO_PATH }}
          path: qmk_firmware

      - name: Checkout vial-qmk
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          path: vial-qmk
          submodules: recursive

      - name: Copy keyboard directory
        run: |
          cp -r qmk_firmware/keyboards/${{ env.KEYBOARD_NAME }} vial-qmk/keyboards/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install QMK dependencies
        run: |
          python3 -m pip install -r vial-qmk/requirements.txt

      - name: Build Firmware
        run: |
          cd vial-qmk
          make ${{ env.KEYBOARD_NAME }}:${{ env.FIRMWARE_VARIANT }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KEYBOARD_NAME }}_${{ env.FIRMWARE_VARIANT }}_firmware
          path: |
            vial-qmk/*.uf2
            vial-qmk/*.hex
            vial-qmk/*.bin

