name: Build Vial QMK Firmware
on:
  push:
    branches:
      - master
  workflow_dispatch:

      env:
      KEYBOARD_NAME: "stroem"
      USER_REPO_PATH: "Tamanegi-51/vial-qmk"
      FIRMWARE_VARIANT: "vial"


jobs:

  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli:latest # QMK環境を使用
    steps:
      # Vial対応QMKを取得
      - name: Checkout Vial QMK Firmware
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          path: vial-qmk

      # 自作リポジトリをチェックアウト
      - name: Checkout user repo
        uses: actions/checkout@v4
        with:
          path: user_repo

      # 自作キーボードフォルダをVial QMKにリンク
      - name: Link custom keyboard
        run: |
          ln -s "$(pwd)/user_repo/${{ env.USER_REPO_PATH }}" \
          "$(pwd)/vial-qmk/keyboards/${{ env.KEYBOARD_NAME }}"
      
      # ファームウェアをビルド
      - name: Build Vial firmware
        working-directory: vial-qmk
        run: |
          make ${{ env.KEYBOARD_NAME }}:${{ env.FIRMWARE_VARIANT }}
      
      # 成果物をアップロード（.uf2 / .hex / .bin）
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KEYBOARD_NAME }}-${{ env.FIRMWARE_VARIANT }}-firmware
          path: |
            vial-qmk/${{ env.KEYBOARD_NAME }}_${{ env.FIRMWARE_VARIANT }}.uf2
            vial-qmk/${{ env.KEYBOARD_NAME }}_${{ env.FIRMWARE_VARIANT }}.hex
            vial-qmk/${{ env.KEYBOARD_NAME }}_${{ env.FIRMWARE_VARIANT }}.bin
